<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // Redirect to index.html and keep the path for React Router
    var path = window.location.pathname;
    window.location.href = '/?redirect=' + encodeURIComponent(path);
  </script>
</head>
<body></body>
</html>
